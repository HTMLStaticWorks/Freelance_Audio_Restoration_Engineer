<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects | PureWave Dashboard</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style> body { background: var(--secondary-color); } </style>
</head>
<body>
    <aside class="dashboard-sidebar">
        <div class="d-flex align-items-center mb-5">
            <svg width="30" height="30" viewBox="0 0 40 40" fill="none" class="me-2"><path d="M5 20C5 11.7157 11.7157 5 20 5C28.2843 5 35 11.7157 35 20C35 28.2843 28.2843 35 20 35C11.7157 35 5 28.2843 5 20Z" stroke="var(--accent-color)" stroke-width="2"/></svg>
            <h4 class="text-white mb-0">PureWave</h4>
        </div>
        <nav>
            <a href="dashboard.html" class="sidebar-link"><i class="bi bi-grid-1x2"></i> Overview</a>
            <a href="client-projects.html" class="sidebar-link active"><i class="bi bi-folder2-open"></i> My Projects</a>
            <a href="upload-project.html" class="sidebar-link"><i class="bi bi-cloud-upload"></i> Upload Project</a>
            <a href="audio-preview.html" class="sidebar-link"><i class="bi bi-file-earmark-music"></i> Audio Previews</a>
            <div class="border-top border-secondary my-4"></div>
            <a href="index.html" class="sidebar-link text-danger"><i class="bi bi-box-arrow-left"></i> Logout</a>
        </nav>
    </aside>

    <main class="dashboard-content">
        <header class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="text-white">My Projects</h2>
            <a href="upload-project.html" class="btn btn-primary-custom"><i class="bi bi-plus-lg me-2"></i>New Project</a>
        </header>

        <div class="row g-4">
            <!-- Project 1 -->
            <div class="col-lg-4 col-md-6">
                <div class="dash-card">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-primary bg-opacity-25 p-2 rounded"><i class="bi bi-file-earmark-music text-primary fs-4"></i></div>
                        <span class="badge bg-success bg-opacity-10 text-success">Completed</span>
                    </div>
                    <h5 class="text-white mb-1">Vinyl_A_Side.wav</h5>
                    <p class="text-muted small">Music Restoration • 24m ago</p>
                    <div class="mt-4 d-flex gap-2">
                        <a href="audio-preview.html" class="btn btn-sm btn-outline-custom w-100">Preview</a>
                        <button class="btn btn-sm btn-primary-custom w-100">Download</button>
                    </div>
                </div>
            </div>
            <!-- Project 2 -->
            <div class="col-lg-4 col-md-6">
                <div class="dash-card">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-info bg-opacity-25 p-2 rounded"><i class="bi bi-mic text-info fs-4"></i></div>
                        <span class="badge bg-primary bg-opacity-10 text-primary">In Progress</span>
                    </div>
                    <h5 class="text-white mb-1">Interview_Forensic.flac</h5>
                    <p class="text-muted small">Dialogue Cleanup • 2h ago</p>
                    <div class="progress mt-4" style="height: 6px;">
                        <div class="progress-bar bg-accent" style="width: 45%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
