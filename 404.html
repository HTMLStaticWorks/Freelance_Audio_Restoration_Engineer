<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Signal Lost | PureWave</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        .glitch-text {
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent);
            text-shadow: 2px 0 var(--primary), -2px 0 var(--secondary);
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }
        .static-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicG7vApxX8A/giphy.gif');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="static-noise"></div>

    <div class="container">
        <h1 class="glitch-text">404</h1>
        <h2 class="mb-4">Oops! Audio Signal Not Found</h2>
        <p class="text-secondary mb-5">The frequency you are looking for has been filtered out or never existed.</p>
        <a href="index.html" class="btn btn-premium">Back To Studio</a>
    </div>

</body>
</html>
