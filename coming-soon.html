<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | PureWave</title>
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #050505 0%, #1e1b4b 100%);
        }
        .countdown-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            min-width: 100px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="mb-5">
            <h1 class="display-3 fw-bold text-white">Something <span class="text-accent">Sonic</span> Is Coming</h1>
            <p class="text-secondary lead">We are fine-tuning our latest restoration tools. Stay tuned.</p>
        </div>

        <div class="d-flex justify-content-center gap-3 mb-5">
            <div class="countdown-item">
                <h2 class="mb-0 text-accent">14</h2>
                <small class="text-secondary">Days</small>
            </div>
            <div class="countdown-item">
                <h2 class="mb-0 text-accent">08</h2>
                <small class="text-secondary">Hours</small>
            </div>
            <div class="countdown-item">
                <h2 class="mb-0 text-accent">45</h2>
                <small class="text-secondary">Mins</small>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="input-group">
                    <input type="email" class="form-control bg-dark border-secondary text-white" placeholder="Notify me when ready">
                    <button class="btn btn-premium">Subscribe</button>
                </div>
                <div class="mt-4">
                    <a href="#" class="text-secondary me-3 fs-4"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-secondary me-3 fs-4"><i class="bi bi-twitter-x"></i></a>
                    <a href="#" class="text-secondary fs-4"><i class="bi bi-linkedin"></i></a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
